name: Build Debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 安装 Android SDK 命令行工具
      - name: Install cmdline-tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          mv android-cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # 4. 接受许可并安装 SDK 组件
      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      # 5. 下载官方 Gradle 并生成 Wrapper
      - name: Setup Gradle
        run: |
          cd $GITHUB_WORKSPACE
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      # 6. 构建 Debug APK
      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 7. 查找并上传 APK
      - name: Find APK
        run: find . -name "*.apk" -type f 2>/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaodekuaiHelper-APK
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: 30
        if: always()
