name: Build Debug APK

on:
  workflow_dispatch:
    inputs:
      debug_info:
        description: 'Debug info'
        required: false
        default: ''

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 JDK 17（官方支持）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 用Gradle官方action自动配置+缓存
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      # 4. 验证 Gradle Wrapper 存在并正确
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      # 5. 授权 Android SDK（如果需要）
      - name: Accept Android SDK licenses
        run: |
          mkdir -p "$HOME/android-sdk/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$HOME/android-sdk/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> "$HOME/android-sdk/licenses/android-sdk-license"
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> "$HOME/android-sdk/licenses/android-sdk-license"

      # 6. 构建 Debug APK
      - name: Build Debug APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all

      # 7. 上传产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PaodekuaiHelper-v1.0-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
